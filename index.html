<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MOB2 Boss AI</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; color:#e8e8e8; font-family:-apple-system,sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
.header { background:#111; border-bottom:2px solid #FF6B00; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo { font-size:20px; font-weight:900; letter-spacing:2px; color:#FF6B00; }
.logo span { color:#e8e8e8; }
.status { display:flex; align-items:center; gap:6px; font-size:11px; color:#888; }
.dot { width:8px; height:8px; border-radius:50%; background:#ff4444; transition:all 0.3s; }
.dot.on { background:#00ff88; box-shadow:0 0 6px #00ff88; }
.tabs { background:#111; border-bottom:1px solid #222; display:flex; flex-shrink:0; }
.tab { flex:1; padding:10px 8px; border:none; background:transparent; color:#666; font-size:11px; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; }
.tab.active { color:#FF6B00; border-bottom-color:#FF6B00; }
.messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
.msg { display:flex; flex-direction:column; gap:3px; }
.msg.user { align-items:flex-end; }
.msg-label { font-size:10px; color:#555; text-transform:uppercase; letter-spacing:1px; padding:0 4px; }
.msg.ai .msg-label { color:#FF6B00; }
.msg-bubble { padding:10px 14px; border-radius:12px; font-size:15px; line-height:1.5; max-width:88%; white-space:pre-wrap; }
.msg.user .msg-bubble { background:#1e3a5f; border-bottom-right-radius:4px; }
.msg.ai .msg-bubble { background:#1a1a1a; border:1px solid #2a2a2a; border-bottom-left-radius:4px; }
.msg.system .msg-bubble { background:transparent; color:#00ff88; font-size:12px; font-family:monospace; border-left:2px solid #00ff88; border-radius:0; padding:6px 10px; }
.msg.logged .msg-bubble { background:transparent; color:#FF6B00; font-size:12px; font-family:monospace; border-left:2px solid #FF6B00; border-radius:0; padding:6px 10px; }
.typing-bubble { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:12px; border-bottom-left-radius:4px; padding:12px 16px; display:flex; gap:4px; width:fit-content; }
.typing-bubble span { width:6px; height:6px; background:#FF6B00; border-radius:50%; animation:bounce 1.2s infinite; }
.typing-bubble span:nth-child(2) { animation-delay:0.2s; }
.typing-bubble span:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
.quick-row { padding:8px 16px; display:flex; gap:8px; overflow-x:auto; flex-shrink:0; background:#0a0a0a; scrollbar-width:none; }
.quick-row::-webkit-scrollbar { display:none; }
.quick-btn { white-space:nowrap; padding:7px 14px; background:#1a1a1a; border:1px solid #2a2a2a; color:#aaa; font-size:13px; border-radius:20px; cursor:pointer; }
.input-area { padding:10px 16px 20px; background:#111; border-top:1px solid #222; flex-shrink:0; }
.setup-area { padding:10px 16px; background:#1a1a1a; border-bottom:1px solid #222; flex-shrink:0; display:flex; gap:8px; align-items:center; }
.setup-area.hidden { display:none; }
.api-input { flex:1; background:#0a0a0a; border:1px solid #333; color:#e8e8e8; padding:10px 12px; font-size:13px; border-radius:8px; outline:none; }
.api-input::placeholder { color:#555; }
.connect-btn { background:#FF6B00; color:#000; border:none; padding:10px 18px; font-weight:700; font-size:13px; border-radius:8px; cursor:pointer; white-space:nowrap; }
.input-row { display:flex; gap:8px; align-items:flex-end; }
.chat-input { flex:1; background:#1a1a1a; border:1px solid #333; color:#e8e8e8; padding:12px 14px; font-size:15px; border-radius:22px; outline:none; resize:none; max-height:100px; line-height:1.4; font-family:inherit; }
.chat-input::placeholder { color:#555; }
.mic-btn, .send-btn { width:46px; height:46px; border-radius:50%; border:none; cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.mic-btn { background:#1a1a1a; border:1px solid #333; }
.mic-btn.recording { background:#ff4444; }
.send-btn { background:#FF6B00; color:#000; }
.send-btn:disabled { background:#333; color:#666; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">MOB2 <span>PILOT CAR</span></div>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="statusTxt">Tap key to connect</span>
  </div>
</div>

<div class="setup-area" id="setupArea">
  <input class="api-input" type="password" id="apiInput" placeholder="Paste Anthropic API key (saved forever)" />
  <button class="connect-btn" onclick="connectAPI()">Connect</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchAgent('boss',this)">Boss</button>
  <button class="tab" onclick="switchAgent('dispatch',this)">Dispatch</button>
  <button class="tab" onclick="switchAgent('data',this)">Data</button>
  <button class="tab" onclick="switchAgent('billing',this)">Billing</button>
</div>

<div class="messages" id="messages">
  <div class="msg system">
    <div class="msg-bubble" id="welcomeMsg">MOB2 Workgroup ready. Paste your API key above to activate.</div>
  </div>
</div>

<div class="quick-row">
  <button class="quick-btn" onclick="quickSend('Log a completed job')">+ Log Job</button>
  <button class="quick-btn" onclick="quickSend('What invoices are unpaid?')">Unpaid Invoices</button>
  <button class="quick-btn" onclick="quickSend('What jobs are scheduled?')">Schedule</button>
  <button class="quick-btn" onclick="quickSend('Weekly summary')">Weekly Summary</button>
  <button class="quick-btn" onclick="quickSend('Create an invoice')">+ Invoice</button>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea class="chat-input" id="chatInput" placeholder="Message your Boss AI..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">mic</button>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>up</button>
  </div>
</div>

<script>
var WEBHOOK_URL = 'https://hook.us2.make.com/stsh4uhkans058txtz5kyejdxp9va3dc';
var PROXY_URL = 'https://mob2-proxy.mob2routeanalyst.workers.dev';
var apiKey = localStorage.getItem('mob2_api_key') || '';
var connected = false;
var currentAgent = 'boss';
var history = [];
var recognition = null;
var isRecording = false;

var systems = {
  boss: 'You are the Boss AI for MOB2 Pilot Car Company, a professional pilot car/escort vehicle business. You manage a Dispatcher, Data Entry Clerk, and Billing Agent. Airtable tables: Routes (Date, Vehicle, Driver, Total Mileage, Billable Miles, Deadhead Miles, Payment, Client, Service Type, Status, Notes), Invoices, Clients, Expenses, Vehicles, Completed. When a user tells you about a completed job extract all details, confirm with them, then output AIRTABLE_DATA: followed by a JSON object with all the fields filled in. Ask for missing info first. Be direct and professional.',
  dispatch: 'You are the Dispatcher for MOB2 Pilot Car Company. Handle route assignments, job scheduling, load types, movement tracking. Be efficient and precise.',
  data: 'You are the Data Entry Clerk for MOB2 Pilot Car Company. Format raw job info for Airtable entry cleanly.',
  billing: 'You are the Billing Agent for MOB2 Pilot Car Company. Handle invoices, payment tracking, rate calculations. Flag unpaid invoices.'
};

window.onload = function() {
  if (apiKey) {
    connected = true;
    document.getElementById('dot').classList.add('on');
    document.getElementById('statusTxt').textContent = 'Connected';
    document.getElementById('setupArea').classList.add('hidden');
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('welcomeMsg').textContent = 'Welcome back! MOB2 workgroup is active.';
    addMsg('ai', "Good. I'm your Boss AI. Tell me about a job, ask about invoices, or give me an update. What do you need?");
  }
};

function connectAPI() {
  var key = document.getElementById('apiInput').value.trim();
  if (!key.startsWith('sk-ant-')) { alert('Invalid key. Should start with sk-ant-'); return; }
  apiKey = key;
  localStorage.setItem('mob2_api_key', apiKey);
  connected = true;
  document.getElementById('dot').classList.add('on');
  document.getElementById('statusTxt').textContent = 'Connected';
  document.getElementById('setupArea').classList.add('hidden');
  document.getElementById('sendBtn').disabled = false;
  addMsg('system', 'Connected and saved!');
  addMsg('ai', "Good. I'm your Boss AI. Tell me about a job, ask about invoices, or give me an update. What do you need?");
}

function switchAgent(agent, btn) {
  currentAgent = agent;
  history = [];
  document.querySelectorAll('.tab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  addMsg('system', 'Switched to ' + agent);
}

function quickSend(text) { document.getElementById('chatInput').value = text; sendMessage(); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight,100)+'px'; }

function sendMessage() {
  if (!connected) { alert('Connect your API key first.'); return; }
  var input = document.getElementById('chatInput');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  addMsg('user', text);
  history.push({role:'user', content:text});
  var typing = addTyping();

  fetch(PROXY_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 2048,
      system: systems[currentAgent],
      messages: history
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    typing.remove();
    if (data.error) { addMsg('system', 'Error: ' + data.error.message); return; }
    var reply = data.content[0].text;
    history.push({role:'assistant', content:reply});
    if (reply.indexOf('AIRTABLE_DATA:') !== -1) {
      var parts = reply.split('AIRTABLE_DATA:');
      addMsg('ai', parts[0].trim());
      try {
        var m = parts[1].match(/\{[\s\S]*\}/);
        if (m) {
          var jobData = JSON.parse(m[0]);
          fetch(WEBHOOK_URL, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(jobData)});
          addMsg('logged', 'Job logged to Airtable!');
        }
      } catch(err) { addMsg('system', 'Parse error: ' + err.message); }
    } else {
      addMsg('ai', reply);
    }
  })
  .catch(function(e) { typing.remove(); addMsg('system', 'Error: ' + e.message); });
}

function addMsg(type, text) {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg ' + (type==='user'?'user':type==='system'?'system':type==='logged'?'logged':'ai');
  var label = type==='user'?'You':type==='ai'?'Boss AI':'';
  div.innerHTML = label
    ? '<div class="msg-label">'+label+'</div><div class="msg-bubble">'+text.replace(/\n/g,'<br>')+'</div>'
    : '<div class="msg-bubble">'+text+'</div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function addTyping() {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = '<div class="msg-label">Boss AI</div><div class="typing-bubble"><span></span><span></span><span></span></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function toggleMic() {
  if (!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)) { addMsg('system','Voice requires Chrome.'); return; }
  if (isRecording) { recognition.stop(); return; }
  var SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.continuous = true;
  recognition.interimResults = false;
  var micBtn = document.getElementById('micBtn');
  recognition.onstart = function() { isRecording=true; micBtn.classList.add('recording'); micBtn.textContent='stop'; };
  recognition.onresult = function(e) { document.getElementById('chatInput').value = e.results[e.results.length-1][0].transcript; };
  recognition.onend = function() {
    isRecording=false; micBtn.classList.remove('recording'); micBtn.textContent='mic';
    var t = document.getElementById('chatInput').value.trim();
    if (t) sendMessage();
  };
  recognition.onerror = function() { isRecording=false; micBtn.classList.remove('recording'); micBtn.textContent='mic'; };
  recognition.start();
}
</script>
</body>
</html>
